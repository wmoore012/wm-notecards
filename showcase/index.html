<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>wm-notecards examples</title>
  <style>
    :root { color-scheme: light; --ink:#111; --paper:#fff; --page:#f2f4f7; --line:#d9d9d5; --cyan:#19bdd8; --mint:#39c79b; }
    * { box-sizing:border-box; }
    body { margin:0; padding:clamp(24px,5vw,72px); background:var(--page); color:var(--ink); font:18px/1.45 system-ui,sans-serif; }
    main { width:min(1080px,100%); margin:auto; }
    h1 { max-width:15ch; margin:0 0 12px; font-size:clamp(42px,7vw,84px); line-height:.94; letter-spacing:-.055em; }
    .lead { max-width:44ch; margin:0 0 42px; color:#555; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:24px; }
    a { min-height:280px; padding:clamp(26px,4vw,48px); border:1px solid var(--line); border-radius:28px; background:var(--paper); color:inherit; text-decoration:none; transition:transform .2s ease,box-shadow .2s ease; }
    a:hover,a:focus-visible { transform:translateY(-5px); box-shadow:0 18px 42px #1112; outline:3px solid var(--cyan); outline-offset:4px; }
    .tag { display:block; margin-bottom:70px; color:#666; font:700 13px/1.2 ui-monospace,monospace; letter-spacing:.16em; text-transform:uppercase; }
    h2 { margin:0 0 12px; font-size:clamp(28px,4vw,48px); line-height:1; letter-spacing:-.04em; }
    .forecast { border-top:8px solid var(--cyan); }
    .eda { border-top:8px solid var(--mint); }
    @media (max-width:760px) { .grid { grid-template-columns:1fr; } a { min-height:230px; } .tag { margin-bottom:48px; } }
    @media (prefers-reduced-motion:reduce) { a { transition:none; } }
    @media (prefers-color-scheme:dark) { :root { color-scheme:dark; --ink:#f7f7f4; --paper:#181a1e; --page:#0f1115; --line:#363940; } .lead,.tag { color:#b9bcc4; } }
  </style>
</head>
<body>
  <main>
    <h1>Pick a notebook.</h1>
    <p class="lead">One polished story. One honest scratchbook. Both use synthetic data.</p>
    <div class="grid">
      <a class="forecast" href="../examples/simple_seasonal_forecasting_lab.executed.html">
        <span class="tag">Question → evidence → decision</span>
        <h2>Seasonal forecasting</h2>
        <span>Open the polished notebook →</span>
      </a>
      <a class="eda" href="../examples/40_column_eda_scratchbook.html">
        <span class="tag">Missingness → choices → audit trail</span>
        <h2>40-column EDA</h2>
        <span>Open the scratchbook →</span>
      </a>
    </div>
  </main>
</body>
</html>
